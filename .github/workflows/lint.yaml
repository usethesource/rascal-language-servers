name: Lint

on:
  # Trigger the workflow on push or pull request,
  # but only for the main branch
  push:
    branches:
      - main
  # Replace pull_request with pull_request_target if you
  # plan to use this action with forks, see the Limitations section
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - '**'

env:
  MAVEN_OPTS: '-Xmx4G -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn -Dorg.slf4j.simpleLogger.showDateTime=true -Djava.awt.headless=true  -Drascal.compile.skip -Drascal.tutor.skip -Drascal.package.skip'

permissions:
  checks: write
  contents: write
  security-events: read


jobs:
  seed-caches:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        id: java
        with:
          java-version: 11
          distribution: 'temurin'
          cache: 'maven'

      - name: setup node
        id: node 
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: rascal-vscode-extension/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: mvn download
        if: steps.java.outputs.cache-hit != 'true'
        working-directory: ./rascal-lsp
        run: |
          mvn -B dependency:go-offline dependency:resolve-plugins
          mvn -Pchecker-framework -B dependency:go-offline dependency:resolve-plugins

      - name: npm download
        if: steps.node.outputs.cache-hit != 'true'
        working-directory: ./rascal-vscode-extension
        run: npm ci

  sonarcloud:
    needs: seed-caches
    name: SonarCloud 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # sonar needs full checkout for better blame information
      - uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'temurin'
          cache: 'maven'
      - name: Cache SonarCloud packages
        uses: actions/cache@v6
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Build, test and analyze java (also collect coverage data)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        working-directory: ./rascal-lsp
        run: mvn -B -Pcoverage verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=usethesource_rascal-language-servers 

  eslint:
    needs: seed-caches
    name: eslint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: rascal-vscode-extension/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name:  install dependencies
        working-directory: ./rascal-vscode-extension
        run: |
          npm ci
          npm install --no-save @microsoft/eslint-formatter-sarif

      - name: Run ESLint with annotations
        working-directory: ./rascal-vscode-extension
        run: npx eslint . --ext .ts --format @microsoft/eslint-formatter-sarif --output-file eslint-results.sarif
        continue-on-error: true

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: rascal-vscode-extension/eslint-results.sarif

  checkstyle:
    needs: seed-caches
    name: checkstyle 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: 
          ref: ${{ github.event.pull_request.head.sha }} # run it on the PR, not on the merged commit, for better line numbers
        
      - uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'temurin'
          cache: 'maven'
      - name: Run checkstyle and print errors
        run: mvn -B checkstyle:checkstyle checkstyle:check
        working-directory: ./rascal-lsp

      - name: Report build results
        uses: gmazzo/publish-report-annotations@v1 # target latest major
        if: ${{ !cancelled() }}
        with:
          testsSummary: off
          reports: "rascal-lsp/target/checkstyle-result.xml"




  githubql:
    strategy:
      matrix:
        include:
          - language: java
            build-mode: manual
          - language: typescript
            build-mode: none
    name: githubql
    needs: seed-caches
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      # required for all workflows
      security-events: write

      # required to fetch internal or private CodeQL packs
      packages: read

      # only required for workflows in private repositories
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - if: ${{ matrix.language == 'java' }}
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'temurin'
          cache: 'maven'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - if: ${{ matrix.language == 'java' }}
        name: Build java 
        run: mvn -B compile
        working-directory: rascal-lsp/

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"   

  checker-framework:
    needs: seed-caches
    name: checker-framework 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          java-version: 11
          distribution: 'temurin'
          cache: 'maven'
      - name: Run checkstyle and print errors
        run: mvn -Pchecker-framework clean compile
        working-directory: ./rascal-lsp
